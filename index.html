  <!-- ABOUT -->
  <section class="section about" id="about">
    <div class="container about-grid">
      <div class="about-image-wrap">
        <img data-key="about.photo" data-attr="src" alt="Michel Vrins" class="about-img" />
      </div>
      <div class="about-text">
        <p class="section-eyebrow" data-key="about.eyebrow"></p>
        <h2 class="section-title" data-key="about.title"></h2>
        <p class="about-lead" data-key="about.lead"></p>
        <div data-key="about.paragraphs" data-list="p"></div>
        <p class="about-merci" data-key="about.merci"></p>
      </div>
    </div>
  </section>

  <!-- SERVICES -->
  <section class="section services" id="services">
    <div class="container">
      <p class="section-eyebrow center" data-key="services.eyebrow"></p>
      <h2 class="section-title center" data-key="services.title"></h2>
      <p class="section-intro center" data-key="services.intro"></p>

      <div class="services-grid" id="services-grid"></div>
    </div>
  </section>

  <template id="tpl-service-card">
    <div class="service-card">
      <img class="service-vignette" />

      <p class="service-desc"></p>

  <!-- AQUARELLE -->

      <div class="aquarelle-text">
        <p class="section-eyebrow" data-key="aquarelle.eyebrow"></p>
        <h2 class="section-title" data-key="aquarelle.title"></h2>
        <p class="about-lead" data-key="aquarelle.lead"></p>
        <div data-key="aquarelle.paragraphs_html" data-list="p" data-html></div>
        <ul class="aquarelle-details" data-key="aquarelle.details" data-list="li"></ul>
        <p class="service-tarif" style="font-size:1rem;" data-key="aquarelle.tarif"></p>
        <a target="_blank" rel="noopener noreferrer" class="aquarelle-peniche-btn" data-key="aquarelle.peniche_url" data-attr="href">
          <span data-key="aquarelle.peniche_label"></span> &#8599;
        </a>
        <a href="#contact" class="btn btn-primary" style="margin-top:1.25rem; display:inline-block;" data-key="aquarelle.cta_inscription"></a>
      </div>
      <div class="aquarelle-image-wrap">
        <img data-key="aquarelle.image_principale" data-attr="src" alt="Michel Vrins, aquareliste" />
      </div>
    </div>
    <div class="container aquarelle-oeuvre">
      <figure class="oeuvre-figure">
        <img data-key="aquarelle.oeuvre_image" data-attr="src" alt="Aquarelle de Michel Vrins" />
        <figcaption data-key="aquarelle.oeuvre_legende"></figcaption>
      </figure>
    </div>
  </section>

  <!-- SEJOUR -->
  <section class="section sejour" id="sejour">
    <div class="container sejour-inner">
      <p class="section-eyebrow center" data-key="sejour.eyebrow"></p>
      <h2 class="section-title center" data-key="sejour.title"></h2>
      <p class="section-intro center" data-key="sejour.intro"></p>
      <div class="sejour-card">
        <div id="sejour-photos"></div>
        <div class="sejour-text">
          <h3 data-key="sejour.title_card"></h3>
          <div data-key="sejour.paragraphs" data-list="p"></div>
          <p class="service-tarif" style="font-size:1rem;" data-key="sejour.tarif"></p>
          <p data-key="sejour.environs"></p>
          <ul class="sejour-list" data-key="sejour.details" data-list="li"></ul>
          <a href="#contact" class="btn btn-primary" style="margin-top:1.25rem; display:inline-block;" data-key="sejour.cta"></a>

      </div>

  <!-- TÉMOIGNAGES -->
  <section class="section temoignages" id="temoignages">

      <h2 class="section-title center" data-key="temoignages.title"></h2>

      <div class="temoignage-featured">
        <div class="temoignage-quote-mark">&ldquo;</div>
        <blockquote data-key="temoignages.featured.quote"></blockquote>
        <p class="temoignage-author" data-key="temoignages.featured.author" data-prefix="— "></p>
      </div>

      <div class="temoignages-grid" id="temoignages-grid"></div>

  </section>

  <template id="tpl-temoignage-card">
    <div class="temoignage-card">
      <p></p>

  <!-- RDV -->
  <section class="section rdv" id="rdv">
    <div class="container rdv-inner">
      <p class="section-eyebrow center" data-key="rdv.eyebrow"></p>

      <p class="section-intro center" data-key="rdv.intro"></p>
      <div class="rdv-box">
        <a target="_blank" rel="noopener noreferrer" class="btn btn-primary btn-large" data-key="rdv.calendly_url" data-attr="href">
          <span data-key="rdv.cta"></span>
        </a>
        <p class="rdv-note" data-key="rdv.note_html" data-html></p>
      </div>
    </div>
  </section>

  <!-- CONTACT -->
  <section class="section contact" id="contact">
    <div class="container contact-grid">
      <div class="contact-info">
        <p class="section-eyebrow" data-key="contact.eyebrow"></p>
        <h2 class="section-title" data-key="contact.title"></h2>
        <p data-key="contact.intro"></p>
        <ul class="contact-details" id="contact-details"></ul>
      </div>

      <div class="contact-form-wrap">
        <form
          method="POST"
          class="contact-form"
          id="contact-form"
        >
          <div class="form-row">
            <div class="form-group">
              <label for="name">Prénom &amp; Nom</label>
              <input type="text" id="name" name="name" required placeholder="Jean Dupont" />
            </div>
            <div class="form-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required placeholder="jean@exemple.fr" />
            </div>
          </div>

          <div class="form-group">
            <label for="phone">Téléphone <span class="optional">(optionnel)</span></label>
            <input type="tel" id="phone" name="phone" placeholder="0400 00 00 00" />
          </div>

          <div class="form-group">
            <label for="subject">Objet de votre message</label>
            <select id="subject" name="subject">
              <option value="">Sélectionnez...</option>
              <option value="massage-californien">Massage Californien</option>
              <option value="jeunes">Écoute & Assistance aux jeunes</option>
              <option value="at">Analyse Transactionnelle</option>
              <option value="gestalt">Gestalt</option>
              <option value="aquarelle">Atelier Aquarelle</option>
              <option value="rdv">Prise de rendez-vous</option>
              <option value="autre">Autre</option>
            </select>
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" required placeholder="Votre message..."></textarea>
          </div>

          <button type="submit" class="btn btn-primary btn-full">Envoyer le message</button>
        </form>
      </div>
    </div>
  </section>

  <!-- MODALS -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal-box">
      <button class="modal-close" aria-label="Fermer">&times;</button>
      <div class="modal-body" id="modal-body"></div>
    </div>
